[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "shared"
version = "0.1.0"
description = "Shared DB, Config and Utilities for Job Seeker Monorepo"
dependencies = [
    "sqlalchemy",
    "playwright",
    "pyyaml",
    "tenacity",
    "psycopg2-binary",
    "alembic",
    "pypdf",
]
